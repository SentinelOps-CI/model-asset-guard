name: Model Asset Guard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality and Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Lean
        uses: leanprover/lean-action@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Rust registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/guardd/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/rust/guardd/Cargo.lock', 'src/rust/guardd/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Python quality tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov

      - name: Run canonical preflight
        run: bash scripts/ci_preflight.sh

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-${{ matrix.os }}
          path: |
            benchmark_results.txt
            coverage.xml
            test_results.json
          if-no-files-found: ignore

  security:
    name: Dependency and unsafe checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --manifest-path src/rust/guardd/Cargo.toml

      - name: Count unsafe usage
        run: |
          UNSAFE_COUNT=$(rg "unsafe" src/rust/guardd/src --count | awk -F: '{sum += $2} END {print sum+0}')
          echo "Unsafe keyword occurrences: $UNSAFE_COUNT"
          test "$UNSAFE_COUNT" -le 20

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Lean
        uses: leanprover/lean-action@v1

      - name: Run benchmark executable
        run: |
          lake exe benchmarks | tee benchmark_results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.txt
